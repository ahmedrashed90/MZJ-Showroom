<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تصدير PDF | MZJ Showroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Tajawal,Arial,sans-serif}.pdf-body{background:#efe7df;color:#2a1714;overflow:auto}.pdf-toolbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;background:rgba(255,255,255,.95);border-bottom:1px solid #e2d5cc;box-shadow:0 12px 28px rgba(62,36,32,.08);backdrop-filter:blur(8px)}.pdf-toolbar h1{margin:0;font-size:18px;color:#3e2420}.pdf-toolbar span{font-size:13px;color:#7b665c;font-weight:700}.toolbar-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.pdf-btn{border:1px solid #d9c8bd;background:#fff;color:#3e2420;border-radius:13px;padding:10px 14px;font-weight:900;cursor:pointer}.pdf-btn.primary{background:#3e2420;color:#fff;border-color:#3e2420}.pdf-btn:disabled{opacity:.55;cursor:not-allowed}.pdf-wrap{padding:18px;display:grid;place-items:center;min-height:calc(100vh - 68px)}
    .pdf-sheet{width:1420px;height:800px;position:relative;overflow:hidden;border-radius:22px;background:linear-gradient(135deg,#fbf7f2,#efe6de);box-shadow:0 24px 75px rgba(62,36,32,.20);direction:rtl;color:#2f1d19}.pdf-sheet:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 8%,rgba(188,143,116,.22),transparent 34%),radial-gradient(circle at 12% 88%,rgba(62,36,32,.08),transparent 32%);pointer-events:none}.pdf-sheet:after{content:"";position:absolute;inset:0;opacity:.07;background-image:linear-gradient(90deg,#3e2420 1px,transparent 1px),linear-gradient(#3e2420 1px,transparent 1px);background-size:48px 48px;pointer-events:none}.pdf-inner{position:relative;z-index:2;height:100%;padding:26px 32px 28px;display:grid;grid-template-rows:auto 1fr auto;gap:16px}.pdf-head{display:flex;align-items:center;justify-content:space-between;gap:24px}.pdf-brand{display:flex;align-items:center;gap:14px;white-space:nowrap}.pdf-brand img{width:128px;height:auto;display:block}.pdf-brand b{font-size:23px;color:#3e2420;font-weight:900}.pdf-tag{background:#3e2420;color:#fff;border-radius:999px;padding:10px 18px;font-weight:900;font-size:15px;border:1px solid #bc8f74}.pdf-main{min-height:0;display:grid;grid-template-columns:1.08fr .92fr;gap:22px}.pdf-photo{min-width:0;min-height:0;border-radius:28px;overflow:hidden;background:#fff;border:1px solid #e0d5cd;display:grid;place-items:center;box-shadow:0 16px 45px rgba(62,36,32,.10)}.pdf-photo img{width:100%;height:100%;object-fit:contain;display:block;background:#f7f5f2}.pdf-no-photo{font-size:28px;font-weight:900;color:#8b766b}.pdf-side{min-width:0;min-height:0;display:grid;grid-template-rows:auto 1fr;gap:16px}.pdf-title{background:linear-gradient(145deg,#4a302b,#281614);color:#fff;border:1px solid rgba(188,143,116,.55);border-radius:28px;padding:24px 26px;box-shadow:0 18px 46px rgba(62,36,32,.24)}.pdf-title h2{font-size:38px;line-height:1.05;margin:0 0 10px;font-weight:900;letter-spacing:-.4px}.pdf-title h3{font-size:25px;margin:0;color:#e0aa87;font-weight:900}.pdf-title p{margin:6px 0 0;color:#f1ded4;font-size:18px;font-weight:700}.pdf-spec-box{min-height:0;background:rgba(255,255,255,.88);border:1px solid #e1d7cf;border-radius:28px;padding:18px 20px;box-shadow:0 14px 38px rgba(62,36,32,.10);overflow:hidden}.pdf-spec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.pdf-spec-head h2{margin:0;font-size:28px;color:#3e2420;font-weight:900}.pdf-spec-head span{font-weight:900;color:#9a715d;background:#fff3ec;border:1px solid #ead6c8;border-radius:999px;padding:7px 12px;font-size:13px}.pdf-specs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.pdf-spec{background:#fff;border:1px solid #e4d8d0;border-radius:17px;padding:9px 12px;min-height:57px;display:flex;flex-direction:column;justify-content:center}.pdf-spec small{display:block;color:#8a6e60;font-weight:900;font-size:12px;margin-bottom:3px}.pdf-spec b{display:block;color:#2f1d19;font-weight:900;font-size:16px;line-height:1.15;word-break:break-word}.pdf-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;color:#725f56;font-weight:800;font-size:13px}.pdf-foot strong{color:#3e2420}.pdf-loading{display:grid;place-items:center;min-height:420px;color:#6b554b;font-weight:900}.hidden{display:none!important}@media(max-width:1500px){.pdf-sheet{transform:scale(.78);transform-origin:top center;margin-bottom:-170px}.pdf-wrap{align-items:start;overflow:auto}}@media(max-width:850px){.pdf-toolbar{align-items:flex-start;flex-direction:column}.toolbar-group{width:100%}.pdf-btn{flex:1}.pdf-sheet{transform:scale(.52);margin-bottom:-380px}}@media print{.pdf-toolbar{display:none!important}.pdf-wrap{padding:0}.pdf-sheet{box-shadow:none;border-radius:0;transform:none;margin:0}}
  </style>
</head>
<body class="pdf-body">
  <div class="pdf-toolbar">
    <div class="toolbar-group"><h1>تصدير PDF</h1><span id="status">جاري تحميل بيانات السيارة...</span></div>
    <div class="toolbar-group"><button class="pdf-btn" onclick="location.href='/dashboard'">رجوع للإدارة</button><button id="exportBtn" class="pdf-btn primary" onclick="exportPdf()" disabled>تصدير PDF</button></div>
  </div>
  <div class="pdf-wrap"><div id="root" class="pdf-loading">جاري تحميل صفحة التصدير...</div></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(window.MZJ_FIREBASE_CONFIG);
    var db = firebase.firestore();
    var loadedData = null, loadedScreen = null;
    function param(n){ var u = new URL(location.href); return u.searchParams.get(n) || ''; }
    function esc(s){ return String(s || '').replace(/[&<>\"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]; }); }
    function cleanText(s){ return String(s || '').replace(/\s+/g,' ').trim(); }
    function uniq(arr){ var seen={}; return (arr||[]).map(cleanText).filter(function(x){ if(!x || seen[x]) return false; seen[x]=1; return true; }); }
    function hash(str){ var h=2166136261; str=String(str||''); for(var i=0;i<str.length;i++){ h^=str.charCodeAt(i); h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24); } return 'car_'+(h>>>0).toString(16); }
    function badImage(url){ url=String(url||'').toLowerCase(); return /default-car|placeholder|no-image|noimage|logo|mzj-logo|favicon|icon|cropped|avatar|watermark|loader|spinner|blank/.test(url); }
    function proxyImage(url){ return url ? '/api/image-proxy?url=' + encodeURIComponent(url) : ''; }
    function setStatus(msg){ document.getElementById('status').textContent = msg || ''; }
    function imagesForSiteColor(data,color){ if(!data||!color||color==='all')return[]; var cols=[].concat(data.colors||[],data.availableSliderColors||[]), hit=null; cols.some(function(c){ var vals=[c.token,c.hex,c.raw,c.external,c.label].filter(Boolean).map(function(x){return String(x).toLowerCase();}); if(vals.indexOf(String(color).toLowerCase())>=0){ hit=c; return true; } return false; }); return hit && Array.isArray(hit.images) ? uniq(hit.images).filter(function(u){return !badImage(u);}) : []; }
    function chooseImages(data, screen){
      var selected = [].concat((screen&&screen.sliderImages)||[], (screen&&screen.selectedImages)||[]).filter(Boolean);
      selected = uniq(selected).filter(function(u){return !badImage(u);});
      if(selected.length) return selected;
      var color = (screen&&screen.imageFilterColor)||'all';
      if(color && color !== 'all'){ var site = imagesForSiteColor(data,color); if(site.length) return site; }
      return uniq([].concat((data&&data.images)||[], data&&data.image ? [data.image] : [])).filter(function(u){return !badImage(u);});
    }
    function specEntries(sp){
      var order=['السعر','موديل السيارة','ماركة السيارة','نوع السيارة','فئة السيارة','هيكل السيارة','سعة المحرك','نوع الناقل','نظام الدفع','الوقود','استهلاك صرفية البنزين','الحصان الميكانيكي','عزم نيوتن','عدد السلندرات','عدد المقاعد','حجم الشنطة','اللون الخارجي','اللون الداخلي','الطول الكلي (مم)','العرض الكلي (مم)','الارتفاع الكلي (مم)','قاعدة العجلات (مم)','الضمان'];
      var used={}, arr=[]; order.forEach(function(k){ if(sp&&sp[k]){ arr.push([k,sp[k]]); used[k]=1; } }); Object.keys(sp||{}).forEach(function(k){ if(!used[k]&&sp[k]) arr.push([k,sp[k]]); }); return arr.slice(0,24);
    }
    async function readCar(carUrl){ var r=await fetch('/api/read-car?url='+encodeURIComponent(carUrl)); if(!r.ok) throw new Error('تعذر قراءة بيانات السيارة'); return await r.json(); }
    async function load(){
      try{
        var screenId=(param('id')||'A1').toUpperCase(); var directUrl=param('url');
        var screen={screenCode:screenId}; var carUrl=directUrl;
        if(!carUrl){ var d=await db.collection('showroom_screens').doc(screenId).get(); if(!d.exists || !d.data().carUrl) throw new Error('لا توجد سيارة مرتبطة بهذه الشاشة'); screen=Object.assign(screen,d.data()||{}); carUrl=screen.carUrl; }
        setStatus('جاري تجهيز PDF للشاشة '+screenId+'...');
        var cache=await db.collection('showroom_car_cache').doc(hash(carUrl)).get().catch(function(){return null;});
        var data=(cache&&cache.exists)?cache.data():await readCar(carUrl);
        loadedData=data; loadedScreen=screen; render(data, screen); document.getElementById('exportBtn').disabled=false; setStatus('جاهز للتصدير PDF');
      }catch(e){ document.getElementById('root').className='pdf-loading'; document.getElementById('root').textContent=e.message||String(e); setStatus('تعذر التحميل'); }
    }
    function render(data, screen){
      var sp=data.specs||{}; var imgs=chooseImages(data,screen); var activeImage=imgs[0]||data.image||'';
      var title=data.title||screen.carName||'سيارة المعرض';
      var makeModel=(sp['ماركة السيارة']||'')+(sp['نوع السيارة']?' '+sp['نوع السيارة']:'');
      var meta=[sp['موديل السيارة'],sp['فئة السيارة']].filter(Boolean).join(' ');
      var specs=specEntries(sp);
      document.getElementById('root').className='pdf-sheet';
      document.getElementById('root').innerHTML='<div class="pdf-inner"><header class="pdf-head"><div class="pdf-brand"><img src="assets/mzj-mark.png" alt="MZJ"><b>مجموعة محمد ذعار العجمي للسيارات</b></div><div class="pdf-tag">بطاقة مواصفات السيارة</div></header><main class="pdf-main"><section class="pdf-photo">'+(activeImage?'<img id="pdfCarImg" crossorigin="anonymous" src="'+esc(proxyImage(activeImage))+'" alt="car">':'<div class="pdf-no-photo">لا توجد صورة معتمدة</div>')+'</section><section class="pdf-side"><div class="pdf-title"><h2>'+esc(title)+'</h2><h3>'+esc(makeModel)+'</h3><p>'+esc(meta)+'</p></div><div class="pdf-spec-box"><div class="pdf-spec-head"><h2>المواصفات الرئيسية</h2><span>'+specs.length+' مواصفة</span></div><div class="pdf-specs">'+specs.map(function(p){return '<div class="pdf-spec"><small>'+esc(p[0])+'</small><b>'+esc(p[1])+'</b></div>';}).join('')+'</div></div></section></main><footer class="pdf-foot"><span><strong>'+esc((screen.screenCode||param('id')||'A1').toUpperCase())+'</strong></span><span>تم التصدير من نظام شاشات MZJ</span></footer></div>';
    }
    function waitImages(el){ var imgs=[].slice.call(el.querySelectorAll('img')); return Promise.all(imgs.map(function(img){ return new Promise(function(resolve){ if(img.complete) return resolve(); img.onload=resolve; img.onerror=resolve; }); })); }
    async function exportPdf(){
      var btn=document.getElementById('exportBtn'), sheet=document.getElementById('root');
      try{ btn.disabled=true; setStatus('جاري إنشاء PDF...'); await waitImages(sheet); await new Promise(function(r){setTimeout(r,250);});
        var canvas=await html2canvas(sheet,{scale:2,useCORS:true,allowTaint:false,backgroundColor:'#f8f4f0'});
        var img=canvas.toDataURL('image/jpeg',0.95); var jspdf=window.jspdf; var pdf=new jspdf.jsPDF('landscape','pt','a4');
        var w=pdf.internal.pageSize.getWidth(), h=pdf.internal.pageSize.getHeight(); pdf.addImage(img,'JPEG',0,0,w,h);
        var name=((loadedData&&loadedData.title)||'mzj-car').replace(/[\\/:*?"<>|]+/g,' ').replace(/\s+/g,' ').trim();
        pdf.save(name+'.pdf'); setStatus('تم تجهيز PDF');
      }catch(e){ setStatus('فشل التصدير: '+(e.message||String(e))); }
      finally{ btn.disabled=false; }
    }
    load();
  </script>
</body>
</html>
